const cats=["All",...new Set(D.map(e=>e.c))];
let active="All";
const catsEl=document.getElementById("cats");
cats.forEach(c=>{
  const b=document.createElement("button");
  b.className="cb"+(c==="All"?" on":"");
  b.textContent=c;
  b.onclick=()=>{active=c;document.querySelectorAll(".cb").forEach(x=>x.classList.remove("on"));b.classList.add("on");render();};
  catsEl.appendChild(b);
});

function render(){
  const q=document.getElementById("q").value.trim().toLowerCase();
  const f=D.filter(e=>{
    const mc=active==="All"||e.c===active;
    const mq=!q||e.a.toLowerCase().includes(q)||e.n.toLowerCase().includes(q)||e.d.toLowerCase().includes(q);
    return mc&&mq;
  });
  document.getElementById("cnt").textContent=f.length+" entr"+(f.length===1?"y":"ies");
  const el=document.getElementById("list");
  if(!f.length){el.innerHTML='<div class="nothing">No entries found</div>';return;}
  el.innerHTML=f.map(e=>`<div class="entry"><div class="abbr">${e.a}</div><div><div class="name">${e.n}<span class="tag">${e.c}</span></div><div class="desc">${e.d}</div></div></div>`).join("");
}
render();
</script>
